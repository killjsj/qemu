      matrix:
        target: [s390x-softmmu, x86_64-softmmu, aarch64-softmmu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --target-list="${{ matrix.target }}"
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-build

      - name: Rename binary
        run: |
