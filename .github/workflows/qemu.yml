      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --disable-tools --disable-docs --enable-debug-tcg \
            --target-list=hexagon-linux-user
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-tcg

  build-some-softmmu:
    name: Build some softmmu
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/debian-all-test-cross:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --disable-tools --enable-debug \
            --target-list=arm-softmmu,aarch64-softmmu,i386-softmmu,riscv64-softmmu,s390x-softmmu,x86_64-softmmu
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-tcg

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
