name: QEMU CI

on:
  workflow_dispatch:

env:
  MAKE: make
  PYTHON: python3
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  get-arch:
    name: Get architecture
    runs-on: ubuntu-latest
    outputs:
      arch: ${{ steps.arch.outputs.arch }}
    steps:
      - name: Detect architecture
        id: arch
        run: |
          arch=$(uname -m)
          case "$arch" in
            x86_64) echo "arch=x86_64" >> $GITHUB_OUTPUT ;;
            i386|i686) echo "arch=x86_32" >> $GITHUB_OUTPUT ;;
            aarch64|arm64) echo "arch=arm64" >> $GITHUB_OUTPUT ;;
            arm*) echo "arch=arm32" >> $GITHUB_OUTPUT ;;
            *) echo "arch=$arch" >> $GITHUB_OUTPUT ;;
          esac
  containers:
    name: Build containers
    runs-on: ubuntu-latest
    outputs:
      container-tag: ${{ steps.build.outputs.container-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build centos9 container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/docker/dockerfiles/centos9.docker
          push: false
          tags: qemu/centos9:${{ github.sha }}
          load: true

      - name: Build fedora container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/docker/dockerfiles/fedora.docker
          push: false
          tags: qemu/fedora:${{ github.sha }}
          load: true

      - name: Set container tag
        id: build
        run: echo "container-tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  build-alpine:
    name: Build Alpine
    needs: containers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [avr-softmmu, loongarch64-softmmu, mips64-softmmu, mipsel-softmmu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --enable-docs --enable-trace-backends=log,simple,syslog \
            --target-list="${{ matrix.target }}"
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-build

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

