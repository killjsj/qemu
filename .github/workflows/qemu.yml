    runs-on: ubuntu-latest
    container: qemu/debian-tricore-cross:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --disable-tools --disable-fdt --enable-debug \
            --target-list=tricore-softmmu
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-tcg

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

  clang-system:
    name: Clang build (system)
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --cc=clang --cxx=clang++ --enable-ubsan \
            --extra-cflags=-fno-sanitize-recover=undefined \
            --target-list=alpha-softmmu,arm-softmmu,m68k-softmmu,mips64-softmmu,s390x-softmmu
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-qtest check-tcg

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

  clang-user:
    name: Clang build (user)
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/debian-all-test-cross:latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --cc=clang --cxx=clang++ --disable-system --enable-ubsan \
            --target-list-exclude=alpha-linux-user,microblazeel-linux-user,aarch64_be-linux-user,i386-linux-user,m68k-linux-user,mipsn32el-linux-user,xtensaeb-linux-user \
            --extra-cflags=-fno-sanitize-recover=undefined
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-unit check-tcg

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

  build-cfi-x86_64:
    name: CFI build x86_64
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/fedora:latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --cc=clang --cxx=clang++ --enable-cfi \
            --enable-safe-stack --disable-slirp \
            --target-list=x86_64-softmmu
          LD_JOBS=1 AR=llvm-ar ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-build

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

  tsan-build:
    name: TSAN build
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/ubuntu:22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --enable-tsan --cc=clang --cxx=clang++ \
            --enable-trace-backends=ust --disable-slirp \
            --target-list=x86_64-softmmu,ppc64-softmmu,riscv64-softmmu,x86_64-linux-user
          setarch -R ${{ env.MAKE }} -j$(nproc)

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

  gcov:
    name: GCOV coverage
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/ubuntu:22.04
    timeout-minutes: 80
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --enable-gcov \
            --target-list=aarch64-softmmu,ppc64-softmmu,s390x-softmmu,x86_64-softmmu
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check-unit check-softfloat

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

      - name: Generate coverage report
        run: |
          cd build
          gcovr --xml-pretty --exclude-unreachable-branches --print-summary \
            -o coverage.xml --root ${{ github.workspace }} . *.p

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage.xml

  build-tci:
    name: TCI build
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/debian-all-test-cross:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          TARGETS="aarch64 arm hppa m68k microblaze ppc64 s390x x86_64"
          mkdir build
          cd build
          ../configure --enable-tcg-interpreter --disable-kvm --disable-docs --disable-gtk --disable-vnc \
            --target-list="$(for tg in $TARGETS; do echo -n ${tg}'-softmmu '; done)"
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} tests/qtest/boot-serial-test tests/qtest/cdrom-test
          for tg in $TARGETS; do
            export QTEST_QEMU_BINARY="./qemu-system-${tg}"
            ./tests/qtest/boot-serial-test || exit 1
            ./tests/qtest/cdrom-test || exit 1
          done
          ${{ env.MAKE }} check-tcg

      - name: Rename binary
        run: |
          cd build
          get_architecture_name() {
            local target=$1
            case "$target" in
              aarch64|arm64) echo "arm64" ;;
              arm*) echo "arm32" ;;
              x86_64) echo "x86_64" ;;
              i386|i686) echo "x86_32" ;;
              *) echo "$target" ;;
            esac
          }
          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

  build-without-defaults:
    name: Build without defaults
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/centos9:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --without-default-devices \
            --without-default-features \
            --disable-fdt \
            --disable-pie \
            --disable-qom-cast-debug \
            --disable-strip \
            --target-list-exclude=aarch64-softmmu,mips64-softmmu,mipsel-softmmu,ppc64-softmmu,sh4el-softmmu,xtensa-softmmu,x86_64-softmmu
          ${{ env.MAKE }} -j$(nproc)
          ${{ env.MAKE }} check

  build-oss-fuzz:
    name: OSS-Fuzz build
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          LSAN_OPTIONS=suppressions=scripts/lsan_suppressions.txt
          CC="clang" CXX="clang++" CFLAGS="-fsanitize=address" ./scripts/oss-fuzz/build.sh
          ASAN_OPTIONS="fast_unwind_on_malloc=0"
          failures=0
          for fuzzer in $(find ./build-oss-fuzz/DEST_DIR/ -executable -type f | grep -v slirp); do
            grep "LLVMFuzzerTestOneInput" ${fuzzer} > /dev/null 2>&1 || continue
            echo Testing ${fuzzer} ...
            "${fuzzer}" -runs=1 -seed=1 || { echo "FAILED:" ${fuzzer} exit code is $?; failures=$(($failures+1)); }
          done
          echo "Number of failures:" $failures
          test $failures = 0

