          for binary in qemu-system-*; do
            if [ -f "$binary" ]; then
              target="${binary#qemu-system-}"
              target="${target%-softmmu}"
              target="${target%-linux-user}"
              arch=$(get_architecture_name "$target")
              if [ "$(uname)" = "Windows" ]; then
                mv "$binary" "qemu-system-$arch.exe"
              else
                mv "$binary" "qemu-system-$arch"
              fi
            fi
          done

  build-user-static:
    name: Build static user mode
    needs: containers
    runs-on: ubuntu-latest
    container: qemu/debian-all-test-cross:latest
    steps:
      - name: Checkout
