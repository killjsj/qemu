      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          mkdir build
          cd build
          ../configure --cc=clang --cxx=clang++ --enable-ubsan \
            --extra-cflags=-fno-sanitize-recover=undefined \
            --target-list=alpha-softmmu,arm-softmmu,m68k-softmmu,mips64-softmmu,s390x-softmmu
