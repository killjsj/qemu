            --target-list="arm-softmmu i386-softmmu riscv64-softmmu sh4eb-softmmu sparc-softmmu xtensa-softmmu" \
            --with-coroutine=sigaltstack --enable-rust || \
            { cat config.log meson-logs/meson-log.txt; exit 1; }
          make -j"$JOBS" && make -j"$JOBS" check-build
          ccache --show-stats
      - uses: actions/upload-artifact@v4
        with:
