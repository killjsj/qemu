          JOBS=$(expr $(nproc) + 1)
          mkdir build && cd build
          ccache --zero-stats
          ../configure --enable-werror --disable-docs --enable-fdt=system \
            --disable-debug-info \
            --target-list="alpha-softmmu microblaze-softmmu mips64el-softmmu" \
            --enable-docs --enable-rust || \
            { cat config.log meson-logs/meson-log.txt; exit 1; }
          make -j"$JOBS" && make -j"$JOBS" check-build
          ccache --show-stats
      - uses: actions/upload-artifact@v4
        with:
          name: build-system-ubuntu
          path: |
            build/
            .git-submodule-status
          retention-days: 2
          exclude: |
            build/**/*.p
            build/**/*.a.p
            build/**/*.c.o
            build/**/*.c.o.d

  build-system-debian:
    name: build-system-debian
    runs-on: ubuntu-latest
