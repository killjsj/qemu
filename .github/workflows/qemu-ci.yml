# ─────────────────────────────────────────────────────────────────────────────
# WINDOWS BUILD (MSYS2 / MinGW64)
# Mirrors the msys2-64bit GitLab job which ran on a Windows SaaS runner.
# ─────────────────────────────────────────────────────────────────────────────

  msys2-64bit:
    name: msys2-64bit (Windows)
    runs-on: windows-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: msys2-64bit-${{ github.sha }}
          restore-keys: msys2-64bit-

      - name: Set up MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-python
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-rust

      - name: Build (MSYS2 shell)
        shell: msys2 {0}
        run: |
          export CCACHE_BASEDIR="$(pwd)"
          export CCACHE_DIR="$CCACHE_BASEDIR/ccache"
          export CCACHE_MAXSIZE="500M"
          JOBS=$(expr $(nproc) + 1)
          mkdir build && cd build
          ccache --zero-stats
          ../configure --disable-system --enable-tools \
            -Ddebug=false -Doptimization=0 --enable-rust || \
            { cat config.log meson-logs/meson-log.txt; exit 1; }
          make -j"$JOBS"
          ccache --show-stats

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: msys2-64bit-logs
          path: |
            build/meson-logs/
            build/cache-log.txt
          retention-days: 7
