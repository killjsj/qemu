      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          filter: blob:none
      - uses: actions/download-artifact@v4
        with:
          name: build-system-debian
      - name: Crash test
        run: |
          cd build && find . -type f -exec touch {} +
          ./run scripts/device-crash-test -q --tcg-only ./qemu-system-i386

  check-system-fedora:
    name: check-system-fedora
    runs-on: ubuntu-latest
    needs: [build-system-fedora]
    container:
      image: ${{ env.IMAGE_BASE }}/fedora:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          filter: blob:none
      - uses: actions/download-artifact@v4
        with:
          name: build-system-fedora
      - name: Run tests
        run: |
          scripts/git-submodule.sh update roms/SLOF
          build/pyvenv/bin/meson subprojects download $(cd build/subprojects && echo *)
          cd build && find . -type f -exec touch {} +
          make NINJA=":" MTESTARGS="--no-suite doc" check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: check-system-fedora-logs
          path: build/meson-logs/
          retention-days: 7

  check-rust-tools-nightly:
    name: check-rust-tools-nightly (optional)
    runs-on: ubuntu-latest
    needs: [build-system-fedora-rust-nightly]
    continue-on-error: true
    container:
      image: ${{ env.IMAGE_BASE }}/fedora-rust-nightly:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@v4
        with:
          name: build-system-fedora-rust-nightly
      - name: Rust checks
        run: |
          cd build && find . -type f -exec touch {} +
          pyvenv/bin/meson devenv -w ../rust ${CARGO:-cargo} fmt --check
          make clippy
          make rustdoc
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rustdoc
          path: rust/target/doc/
          retention-days: 2

# ─────────────────────────────────────────────────────────────────────────────
# WINDOWS BUILD (MSYS2 / MinGW64)
# ─────────────────────────────────────────────────────────────────────────────

  msys2-64bit:
    name: msys2-64bit (Windows)
    runs-on: windows-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false
      - uses: actions/cache@v4
        with:
          path: ccache
          key: msys2-64bit-${{ github.sha }}
          restore-keys: msys2-64bit-
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-python
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-rust
      - name: Build
        shell: msys2 {0}
        run: |
          export CCACHE_BASEDIR="$(pwd)" CCACHE_DIR="$(pwd)/ccache" CCACHE_MAXSIZE=500M
          JOBS=$(expr $(nproc) + 1)
          mkdir build && cd build && ccache --zero-stats
          ../configure --disable-system --enable-tools \
            -Ddebug=false -Doptimization=0 --enable-rust || \
            { cat config.log meson-logs/meson-log.txt; exit 1; }
          make -j"$JOBS" && ccache --show-stats
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: msys2-64bit-logs
          path: |
            build/meson-logs/
            build/cache-log.txt
          retention-days: 7
