# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — STATIC CHECKS
# ─────────────────────────────────────────────────────────────────────────────

  check-patch:
    name: check-patch
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    container:
      image: python:3.10-alpine
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1000
      - run: apk -U add git perl
      - run: .gitlab-ci.d/check-patch.py
        continue-on-error: true

  check-dco:
    name: check-dco
    runs-on: ubuntu-latest
    container:
      image: python:3.10-alpine
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1000
      - run: apk -U add git
      - run: .gitlab-ci.d/check-dco.py

  check-build-units:
    name: check-build-units
    runs-on: ubuntu-latest
    needs: [container-debian]
    container:
      image: ${{ env.IMAGE_BASE }}/debian:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
      - run: apt install --assume-yes --no-install-recommends jq
      - run: mkdir build && cd build && ../configure
      - run: .gitlab-ci.d/check-units.py build/compile_commands.json

  check-python-minreqs:
    name: check-python-minreqs
    runs-on: ubuntu-latest
    needs: [container-python]
    container:
      image: ${{ env.IMAGE_BASE }}/python:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: make -C python check-minreqs

  check-python-tox:
    name: check-python-tox (optional)
    runs-on: ubuntu-latest
    needs: [container-python]
    continue-on-error: true
    container:
      image: ${{ env.IMAGE_BASE }}/python:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: make -C python check-tox
        env:
          QEMU_TOX_EXTRA_ARGS: --skip-missing-interpreters=false

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — NATIVE BUILDS
# ─────────────────────────────────────────────────────────────────────────────

  build-system-alpine:
    name: build-system-alpine
    runs-on: ubuntu-latest
    needs: [container-alpine]
    container:
      image: ${{ env.IMAGE_BASE }}/alpine:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          filter: blob:none
      - uses: actions/cache@v4
        with:
          path: ccache
          key: build-system-alpine-${{ github.sha }}
          restore-keys: build-system-alpine-
      - name: Build
        run: |
          export CCACHE_BASEDIR="$(pwd)" CCACHE_DIR="$(pwd)/ccache" CCACHE_MAXSIZE=500M
          export PATH="$CCACHE_WRAPPERSDIR:$PATH"
          JOBS=$(expr $(nproc) + 1)
          mkdir build && cd build
          ccache --zero-stats
          ../configure --enable-werror --disable-docs --enable-fdt=system \
            --disable-debug-info \
            --target-list="avr-softmmu loongarch64-softmmu mips64-softmmu mipsel-softmmu" \
            --enable-trace-backends=log,simple,syslog || \
            { cat config.log meson-logs/meson-log.txt; exit 1; }
          make -j"$JOBS" && make -j"$JOBS" check-build
          ccache --show-stats
      - uses: actions/upload-artifact@v4
        with:
          name: build-system-alpine
          path: |
            build/
            .git-submodule-status
          retention-days: 2
          exclude: |
            build/**/*.p
            build/**/*.a.p
            build/**/*.c.o
            build/**/*.c.o.d

  build-system-ubuntu:
    name: build-system-ubuntu
    runs-on: ubuntu-latest
    needs: [container-ubuntu2204]
    container:
      image: ${{ env.IMAGE_BASE }}/ubuntu2204:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          filter: blob:none
      - uses: actions/cache@v4
        with:
          path: ccache
          key: build-system-ubuntu-${{ github.sha }}
          restore-keys: build-system-ubuntu-
      - name: Build
        run: |
          export CCACHE_BASEDIR="$(pwd)" CCACHE_DIR="$(pwd)/ccache" CCACHE_MAXSIZE=500M
