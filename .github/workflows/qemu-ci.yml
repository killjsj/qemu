# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — TESTS
# ─────────────────────────────────────────────────────────────────────────────

  check-system-alpine:
    name: check-system-alpine
    runs-on: ubuntu-latest
    needs: [build-system-alpine]
    container:
      image: ${{ env.IMAGE_BASE }}/alpine:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          filter: blob:none
      - uses: actions/download-artifact@v4
        with:
          name: build-system-alpine
      - name: Run tests
        run: |
          scripts/git-submodule.sh update roms/SLOF
          build/pyvenv/bin/meson subprojects download $(cd build/subprojects && echo *)
          cd build && find . -type f -exec touch {} +
          make NINJA=":" MTESTARGS="--no-suite doc" check-unit check-qtest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: check-system-alpine-logs
          path: build/meson-logs/
          retention-days: 7

  check-system-ubuntu:
    name: check-system-ubuntu
    runs-on: ubuntu-latest
    needs: [build-system-ubuntu]
    container:
      image: ${{ env.IMAGE_BASE }}/ubuntu2204:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
