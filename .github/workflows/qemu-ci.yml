# GitHub Actions CI for QEMU
# Converted from .gitlab-ci.yml and .gitlab-ci.d/ configs.
#
# Key differences from GitLab CI:
#  - Container pre-build stage is replaced by direct Docker image pulls from
#    the upstream QEMU GitLab container registry (read-only public images).
#  - ccache is handled via actions/cache instead of GitLab cache.
#  - Artifacts use actions/upload-artifact / download-artifact.
#  - Windows job uses a native windows-latest runner with MSYS2 action.
#  - Cross-build jobs run inside the appropriate cross-compiler Docker images.

name: QEMU CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  QEMU_CI_CONTAINER_REGISTRY: registry.gitlab.com/qemu-project/qemu
  QEMU_CI_CONTAINER_TAG: latest

# ── Concurrency ───────────────────────────────────────────────────────────────
# Cancel in-flight runs for the same branch on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# STATIC CHECKS
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  check-patch:
    name: check-patch
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    container:
      image: python:3.10-alpine
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1000
      - name: Install deps
        run: apk -U add git perl
      - name: Run check-patch
        run: .gitlab-ci.d/check-patch.py
        continue-on-error: true   # allow_failure: true

  check-dco:
    name: check-dco
    runs-on: ubuntu-latest
    container:
      image: python:3.10-alpine
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1000
      - name: Install deps
        run: apk -U add git
      - name: Run check-dco
        run: .gitlab-ci.d/check-dco.py

  check-build-units:
    name: check-build-units
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/qemu-project/qemu/debian:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
      - name: Install jq
        run: apt install --assume-yes --no-install-recommends jq
      - name: Configure
        run: |
          mkdir build
          cd build
          ../configure
      - name: Analyse build units
        run: .gitlab-ci.d/check-units.py build/compile_commands.json

  check-python-minreqs:
    name: check-python-minreqs
    runs-on: ubuntu-latest
    needs: []
    container:
      image: registry.gitlab.com/qemu-project/qemu/python:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Check minimum requirements
        run: make -C python check-minreqs

  check-python-tox:
    name: check-python-tox (optional)
    runs-on: ubuntu-latest
    needs: []
    container:
      image: registry.gitlab.com/qemu-project/qemu/python:latest
    continue-on-error: true   # optional job
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run tox
        run: make -C python check-tox
        env:
          QEMU_TOX_EXTRA_ARGS: --skip-missing-interpreters=false

# ─────────────────────────────────────────────────────────────────────────────
# NATIVE BUILDS — Alpine
# ─────────────────────────────────────────────────────────────────────────────

  build-system-alpine:
    name: build-system-alpine
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/qemu-project/qemu/alpine:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          filter: blob:none
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: build-system-alpine-${{ github.sha }}
          restore-keys: build-system-alpine-
      - name: Build
        run: |
          export CCACHE_BASEDIR="$(pwd)"
          export CCACHE_DIR="$CCACHE_BASEDIR/ccache"
          export CCACHE_MAXSIZE="500M"
          export PATH="$CCACHE_WRAPPERSDIR:$PATH"
          JOBS=$(expr $(nproc) + 1)
          mkdir build && cd build
          ccache --zero-stats
          ../configure --enable-werror --disable-docs --enable-fdt=system \
            --disable-debug-info \
            --target-list="avr-softmmu loongarch64-softmmu mips64-softmmu mipsel-softmmu" \
            --enable-trace-backends=log,simple,syslog || \
            { cat config.log meson-logs/meson-log.txt; exit 1; }
          make -j"$JOBS"
          make -j"$JOBS" check-build
          ccache --show-stats
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-system-alpine
          path: |
            build/
            .git-submodule-status
          retention-days: 2

  check-system-alpine:
    name: check-system-alpine
    runs-on: ubuntu-latest
    needs: build-system-alpine
    container:
      image: registry.gitlab.com/qemu-project/qemu/alpine:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          filter: blob:none
      - uses: actions/download-artifact@v4
        with:
          name: build-system-alpine
      - name: Run tests
        run: |
          scripts/git-submodule.sh update roms/SLOF
          build/pyvenv/bin/meson subprojects download $(cd build/subprojects && echo *)
          cd build
          find . -type f -exec touch {} +
          make NINJA=":" MTESTARGS="--no-suite doc" check-unit check-qtest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: check-system-alpine-logs
          path: build/meson-logs/
          retention-days: 7

