    name: check-rust-tools-nightly (optional)
    runs-on: ubuntu-latest
    needs: build-system-fedora-rust-nightly
    continue-on-error: true
    container:
      image: registry.gitlab.com/qemu-project/qemu/fedora-rust-nightly:latest
