# GitHub Actions CI for QEMU
# Converted from .gitlab-ci.yml and .gitlab-ci.d/
#
# Stages:
#   1. containers  — build & push all Docker images to GHCR
#   2. build       — native + cross-compile builds (pull images from GHCR)
#   3. test        — run unit/qtest/functional suites against build artifacts
#
# Required repository secrets: none beyond the default GITHUB_TOKEN.
# GHCR images are pushed to ghcr.io/<owner>/<repo>/qemu/<name>:latest

name: QEMU CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Weekly container rebuild — mirrors GitLab's weekly-container-builds job
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # e.g. ghcr.io/killjsj/qemu/qemu
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/qemu/qemu

# ═════════════════════════════════════════════════════════════════════════════
jobs:

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — CONTAINERS
# Each job builds one Dockerfile from tests/docker/dockerfiles/<name>.docker
# and pushes it to GHCR. The upstream QEMU GitLab registry is used as a layer
# cache source so only changed layers are rebuilt.
# ─────────────────────────────────────────────────────────────────────────────

  container-alpine:
    name: "container: alpine"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: tests/docker/dockerfiles/alpine.docker
          push: true
          tags: ${{ env.IMAGE_BASE }}/alpine:latest
          cache-from: |
            type=registry,ref=${{ env.IMAGE_BASE }}/alpine:latest
            type=registry,ref=registry.gitlab.com/qemu-project/qemu/qemu/alpine:latest
          cache-to: type=inline

  container-debian:
