  build-system-fedora:
    name: build-system-fedora
    runs-on: ubuntu-latest
    needs: [container-fedora]
    container:
      image: ${{ env.IMAGE_BASE }}/fedora:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          filter: blob:none
      - uses: actions/cache@v4
        with:
          path: ccache
          key: build-system-fedora-${{ github.sha }}
          restore-keys: build-system-fedora-
      - name: Build
        run: |
          export CCACHE_BASEDIR="$(pwd)" CCACHE_DIR="$(pwd)/ccache" CCACHE_MAXSIZE=500M
          export PATH="$CCACHE_WRAPPERSDIR:$PATH"
          JOBS=$(expr $(nproc) + 1)
          mkdir build && cd build
          ccache --zero-stats
          ../configure --enable-werror --disable-docs --enable-fdt=system \
            --disable-debug-info \
            --target-list="mips-softmmu xtensa-softmmu m68k-softmmu riscv32-softmmu ppc-softmmu sparc64-softmmu" \
            --disable-gcrypt --enable-nettle --enable-crypto-afalg --enable-rust || \
            { cat config.log meson-logs/meson-log.txt; exit 1; }
          make -j"$JOBS" && make -j"$JOBS" check-build check-doc
          ccache --show-stats
      - uses: actions/upload-artifact@v4
        with:
          name: build-system-fedora
          path: |
            build/
            .git-submodule-status
          retention-days: 2
          exclude: |
            build/**/*.p
            build/**/*.a.p
            build/**/*.c.o
            build/**/*.c.o.d

  build-system-fedora-rust-nightly:
    name: build-system-fedora-rust-nightly (optional)
    runs-on: ubuntu-latest
    needs: [container-fedora-rust-nightly]
    continue-on-error: true
    container:
      image: ${{ env.IMAGE_BASE }}/fedora-rust-nightly:latest
      credentials:
